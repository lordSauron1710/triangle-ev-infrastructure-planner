name: Verify case study

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install model dependencies
        run: pip install -r model/requirements.txt

      - name: Test optimization model
        run: python -m unittest discover -s model -p "test_*.py"

      - name: Regenerate scenario plans
        run: python model/optimize.py

      - name: Verify generated plans are committed
        run: git diff --exit-code src/data/generatedPlans.json

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dashboard dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build
